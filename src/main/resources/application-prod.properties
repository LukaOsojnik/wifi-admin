# PROD profile — real WiFi platform. Replace the placeholder host with the actual endpoint
# (ideally injected via env var, e.g. PLATFORM_SOAP_ENDPOINT).
platform.soap.endpoint=${PLATFORM_SOAP_ENDPOINT:https://wifi-platform.example.com/platform}
platform.soap.connect-timeout-ms=3000
platform.soap.receive-timeout-ms=5000

# Lean logging in production.
logging.level.org.example.htwifiadmin=INFO

# H2 file DB for a runnable demo; a real deployment would use a managed DB (e.g. Postgres)
# and schema migrations (Flyway/Liquibase) instead of ddl-auto.
spring.datasource.url=jdbc:h2:file:./data/wifi-admin
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
