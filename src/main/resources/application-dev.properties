# DEV profile — local development against the Mockoon mock (docker compose up -d).
platform.soap.endpoint=http://localhost:8080/platform
platform.soap.connect-timeout-ms=3000
platform.soap.receive-timeout-ms=5000

# Verbose logging locally. Uncomment to log raw SOAP request/response payloads (very chatty):
# logging.level.org.apache.cxf.services=DEBUG
logging.level.org.example.htwifiadmin=DEBUG

# H2 file DB — survives restarts (read-through cache of platform data).
spring.datasource.url=jdbc:h2:file:./data/wifi-admin
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
