spring.application.name=HT-wifi-admin

# Java 25 virtual threads: high blocking-I/O concurrency with the simple synchronous model
spring.threads.virtual.enabled=true

# REST server port (mock platform runs on 8080)
server.port=8081

# Default profile: dev (points at the local Mockoon mock).
# Run against the real platform with: --spring.profiles.active=prod
spring.profiles.active=dev

# Environment-specific settings (platform.soap.endpoint, logging levels, ...) live in
# application-dev.properties / application-prod.properties.

# HTTP Basic credentials. Dev defaults; OVERRIDE in prod via env vars
# SECURITY_USER_NAME / SECURITY_USER_PASSWORD.
security.user.name=${SECURITY_USER_NAME:admin}
security.user.password=${SECURITY_USER_PASSWORD:admin}

# Nightly DB<-platform sync (refreshes cached CPEs, stalest first).
sync.enabled=true
sync.cron=0 0 2 * * *
sync.batch-size=50

# CORS: allow the React dev server origin to call the API from the browser.
cors.allowed-origin=http://localhost:5173
